<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vimeo Library — Ryan Boucher</title>
<style>
  :root {
    --black: #0A0A0A; --surface: #141414; --border: #2A2A2A;
    --text: #F0EDE8; --muted: #888; --gold: #C8A96E;
    --sans: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--text); font-family: var(--sans);
         font-weight: 300; -webkit-font-smoothing: antialiased; min-height: 100vh; }

  header {
    padding: 32px 48px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 24px;
  }
  .header-name { font-size: 20px; font-weight: 200; letter-spacing: 0.18em;
                 text-transform: uppercase; color: var(--gold); }
  .header-sub  { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
                 color: var(--muted); }

  .toolbar {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 48px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .search-input {
    flex: 1; max-width: 400px;
    background: var(--black); border: 1px solid var(--border);
    color: var(--text); font-family: var(--sans); font-size: 13px;
    font-weight: 300; padding: 10px 14px; outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--gold); }
  .search-input::placeholder { color: var(--muted); }

  .status { font-size: 11px; letter-spacing: 0.1em; color: var(--muted); margin-left: auto; }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 3px;
    padding: 3px;
  }

  .card {
    position: relative;
    background: var(--surface);
    cursor: pointer;
    transition: outline 0.15s;
  }
  .card:hover .card-overlay { opacity: 1; }
  .card.copied { outline: 2px solid var(--gold); }

  .thumb { position: relative; aspect-ratio: 16/9; overflow: hidden; background: #111; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block;
               filter: brightness(0.85); transition: filter 0.3s; }
  .card:hover .thumb img { filter: brightness(0.3); }

  .card-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.25s;
    gap: 8px;
  }
  .copy-icon {
    font-size: 22px; color: #fff;
  }
  .copy-label {
    font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(255,255,255,0.7);
  }

  .dur {
    position: absolute; bottom: 6px; right: 8px;
    background: rgba(0,0,0,0.75); color: #fff;
    font-size: 10px; padding: 2px 5px; border-radius: 2px;
  }

  .card-info { padding: 10px 12px 12px; }
  .card-title { font-size: 12px; font-weight: 300; color: var(--text);
                line-height: 1.4; margin-bottom: 4px; }
  .card-meta  { font-size: 10px; color: var(--muted); letter-spacing: 0.05em; }

  /* Copied toast */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: var(--gold); color: var(--black);
    font-size: 11px; font-weight: 400; letter-spacing: 0.15em; text-transform: uppercase;
    padding: 12px 28px; border-radius: 2px;
    opacity: 0; transition: opacity 0.2s; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  .pagination {
    display: flex; align-items: center; justify-content: center; gap: 16px;
    padding: 32px; border-top: 1px solid var(--border);
  }
  .pag-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-family: var(--sans); font-size: 10px; letter-spacing: 0.15em;
    text-transform: uppercase; padding: 8px 20px; cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .pag-btn:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }
  .pag-btn:disabled { opacity: 0.3; cursor: default; }
  .pag-info { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }

  .empty { padding: 80px 48px; text-align: center; color: var(--muted);
           font-size: 13px; letter-spacing: 0.1em; }

  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .grid { grid-template-columns: 1fr; }
    header, .toolbar { padding-left: 20px; padding-right: 20px; } }
</style>
</head>
<body>

<header>
  <span class="header-name">Ryan Boucher</span>
  <span class="header-sub">Vimeo Library</span>
</header>

<div class="toolbar">
  <input class="search-input" type="text" placeholder="Search videos…" id="search">
  <span class="status" id="status">Loading…</span>
</div>

<div class="grid" id="grid"></div>
<div class="pagination" id="pagination" style="display:none">
  <button class="pag-btn" id="prev">← Previous</button>
  <span class="pag-info" id="pag-info"></span>
  <button class="pag-btn" id="next">Next →</button>
</div>

<div class="toast" id="toast">URL copied to clipboard</div>

<script>
  var state = { query: '', page: 1, pages: 1, total: 0, timer: null };

  function fmt(sec) {
    return Math.floor(sec/60) + ':' + String(sec%60).padStart(2,'0');
  }

  async function load(query, page) {
    document.getElementById('status').textContent = 'Loading…';
    document.getElementById('grid').innerHTML = '';
    document.getElementById('pagination').style.display = 'none';

    try {
      var qs = new URLSearchParams({ page: page || 1 });
      if (query) qs.set('query', query);
      var r = await fetch('/.netlify/functions/vimeo?' + qs);
      var d = await r.json();

      state.page  = d.page  || 1;
      state.pages = d.pages || 1;
      state.total = d.total || 0;

      document.getElementById('status').textContent =
        state.total + ' video' + (state.total !== 1 ? 's' : '');

      var grid = document.getElementById('grid');

      if (!d.videos || !d.videos.length) {
        grid.innerHTML = '<div class="empty">No videos found</div>';
        return;
      }

      d.videos.forEach(function(v) {
        var card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="thumb">
            ${v.thumbnail ? '<img src="'+v.thumbnail+'" alt="'+v.title+'">' : ''}
            <div class="card-overlay">
              <div class="copy-icon">⧉</div>
              <div class="copy-label">Copy embed URL</div>
            </div>
            <span class="dur">${v.duration}</span>
          </div>
          <div class="card-info">
            <div class="card-title">${v.title}</div>
            <div class="card-meta">${v.embedUrl}</div>
          </div>
        `;
        card.onclick = function() { copyURL(card, v); };
        grid.appendChild(card);
      });

      // Pagination
      if (state.pages > 1) {
        var pag = document.getElementById('pagination');
        pag.style.display = 'flex';
        document.getElementById('pag-info').textContent = state.page + ' of ' + state.pages;
        document.getElementById('prev').disabled = state.page <= 1;
        document.getElementById('next').disabled = state.page >= state.pages;
      }

    } catch(e) {
      document.getElementById('status').textContent = 'Error loading videos';
      console.error(e);
    }
  }

  function copyURL(card, video) {
    navigator.clipboard.writeText(video.embedUrl).then(function() {
      // Flash card
      card.classList.add('copied');
      setTimeout(function() { card.classList.remove('copied'); }, 1500);
      // Show toast
      var toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 2500);
    });
  }

  // Search
  document.getElementById('search').addEventListener('input', function(e) {
    state.query = e.target.value;
    clearTimeout(state.timer);
    state.timer = setTimeout(function() { load(state.query, 1); }, 400);
  });

  // Pagination
  document.getElementById('prev').addEventListener('click', function() {
    if (state.page > 1) load(state.query, state.page - 1);
  });
  document.getElementById('next').addEventListener('click', function() {
    if (state.page < state.pages) load(state.query, state.page + 1);
  });

  load('', 1);
</script>
</body>
</html>
